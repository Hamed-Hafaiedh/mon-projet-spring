<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver une place - Parking Location</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col min-h-screen">

    <nav class="app-nav shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="app-nav-row flex justify-between h-16">
                <div class="flex items-center">
                    <span class="brand-title text-white text-xl font-bold cursor-pointer" onclick="window.location.href='parkings.html'">🅿️ ParkingLocation</span>
                </div>
                <button class="nav-toggle-btn" type="button" aria-label="Ouvrir le menu" aria-expanded="false" data-target="reserverNavActions">
                    <span aria-hidden="true">☰</span>
                </button>
                <div id="reserverNavActions" class="app-nav-actions collapsible flex items-center">
                    <span id="userGreeting" class="text-blue-100 hidden sm:block"></span>
                    <button type="button" class="btn btn-secondary text-sm" data-theme-toggle aria-pressed="false">Mode sombre</button>
                    <a href="mes-reservations.html" class="nav-action-link">Mes Réservations</a>
                    <button id="logoutBtn" class="btn btn-danger text-sm">Déconnexion</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-lg w-full panel p-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Réserver une place</h2>
                <p id="parkingName" class="text-blue-600 font-medium mt-1">Chargement...</p>
            </div>

            <div id="errorMessage" class="hidden alert-box alert-error mb-4" role="alert"></div>
            <div id="successMessage" class="hidden alert-box alert-success mb-4" role="alert"></div>

            <form id="reservationForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="startTime" class="block text-sm font-semibold text-gray-700">Debut *</label>
                        <input type="datetime-local" id="startTime" required class="field mt-1">
                        <p class="text-xs text-gray-500 mt-1">La reservation doit commencer dans le futur.</p>
                    </div>

                    <div>
                        <label for="endTime" class="block text-sm font-semibold text-gray-700">Fin *</label>
                        <input type="datetime-local" id="endTime" required class="field mt-1">
                        <p class="text-xs text-gray-500 mt-1">La fin doit etre apres l'heure de debut.</p>
                    </div>
                </div>

                <div class="card-surface p-4 bg-slate-50">
                    <p class="text-sm font-semibold text-slate-700 mb-2">Resume de reservation</p>
                    <div class="flex items-center justify-between text-sm text-slate-600">
                        <span>Duree estimee</span>
                        <span id="durationPreview" class="font-semibold text-slate-800">-</span>
                    </div>
                    <div class="flex items-center justify-between text-sm text-slate-600 mt-1">
                        <span>Montant estime</span>
                        <span id="pricePreview" class="font-semibold text-slate-800">-</span>
                    </div>
                </div>

                <div class="pt-4 reservation-actions flex items-center justify-between">
                    <a href="parkings.html" class="text-sm text-blue-600 hover:text-blue-500">Annuler</a>
                    <button id="submitBtn" type="submit" class="btn btn-primary font-bold py-2 px-4 disabled:opacity-60 disabled:cursor-not-allowed">
                        Confirmer la réservation
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-white py-5 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            <p>&copy; 2026 Parking Location. Tous droits reserves.</p>
        </div>
    </footer>

    <script src="js/responsive-nav.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>
    <script src="js/reserver.js"></script>
</body>
</html>
