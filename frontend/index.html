<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Location - Accueil</title>
    <!-- Intégration de Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans leading-normal tracking-normal flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="app-nav p-4 shadow-md">
        <div class="container mx-auto app-nav-row flex justify-between items-center gap-3 flex-wrap">
            <a href="index.html" class="brand-title text-white text-2xl font-bold font-serif flex items-center">
                <svg class="h-8 w-8 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
                EasyPark
            </a>
            
            <button class="nav-toggle-btn" type="button" aria-label="Ouvrir le menu" aria-expanded="false" data-target="nav-links">
                <span aria-hidden="true">☰</span>
            </button>

            <div id="nav-links" class="app-nav-actions collapsible home-nav-links">
                <!-- Ces liens changeront dynamiquement selon si l'utilisateur est connecté ou non via JS -->
                <button type="button" class="btn btn-secondary text-sm" data-theme-toggle aria-pressed="false">Mode sombre</button>
                <a href="login.html" class="nav-action-link">Connexion</a>
                <a href="register.html" class="nav-action-link">S'inscrire</a>
            </div>
        </div>
    </nav>

    <!-- Héros Section -->
    <header class="flex-grow flex items-center justify-center py-12 px-6">
        <div class="hero-block text-center max-w-4xl w-full px-8 py-14">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-6">Trouvez la place de parking idéale.</h1>
            <p class="text-lg text-slate-600 mb-8 max-w-2xl mx-auto">Réservez votre stationnement à l'avance, payez en ligne en toute sécurité et garez-vous l'esprit serein avec EasyPark.</p>
            <a href="parkings.html" class="inline-block btn btn-primary text-lg px-8 py-4 rounded-full shadow-lg transform hover:scale-105 transition duration-300">
                Voir les parkings disponibles
            </a>
        </div>
    </header>

    <!-- Footer -->
    <footer class="bg-slate-900 text-white text-center p-6 mt-auto">
        <p>&copy; 2026 EasyPark - Tous droits réservés.</p>
    </footer>

    <!-- Script principal -->
    <script src="js/responsive-nav.js"></script>
    <script src="js/main.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
