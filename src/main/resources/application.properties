spring.application.name=parking-location

# Render injecte PORT automatiquement; 8080 reste la valeur locale.
server.port=${PORT:8080}

# Datasource: variables d'environnement en production, fallback local pour dev.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/parking_location?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

app.jwtSecret=${APP_JWTSECRET:mySecretKeyForParkingLocationAppWhichMustBeAtLeast32BytesLong}
app.jwtExpirationMs=${APP_JWTEXPIRATIONMS:86400000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

